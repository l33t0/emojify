name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            archive: tar.gz
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            archive: tar.gz
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            archive: tar.gz
            use_cross: false
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
            use_cross: false
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
        shell: bash

      - name: Strip binary (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          BINARY=target/${{ matrix.target }}/release/emojify
          if command -v strip &> /dev/null && file "$BINARY" | grep -q "not stripped"; then
            strip "$BINARY" || true
          fi

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        run: |
          STAGING="emojify-${{ matrix.target }}"
          mkdir -p "$STAGING"
          cp target/${{ matrix.target }}/release/emojify "$STAGING/"
          cp LICENSE "$STAGING/"
          tar czf "emojify-${{ matrix.target }}.tar.gz" "$STAGING"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $STAGING = "emojify-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $STAGING -Force
          Copy-Item "target/${{ matrix.target }}/release/emojify.exe" "$STAGING/"
          Copy-Item "LICENSE" "$STAGING/"
          Compress-Archive -Path "$STAGING/*" -DestinationPath "emojify-${{ matrix.target }}.zip"

      - name: Compute checksum (unix)
        if: matrix.archive == 'tar.gz'
        run: sha256sum "emojify-${{ matrix.target }}.tar.gz" > "emojify-${{ matrix.target }}.tar.gz.sha256"

      - name: Compute checksum (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "emojify-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  emojify-${{ matrix.target }}.zip" | Out-File -Encoding utf8 "emojify-${{ matrix.target }}.zip.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            emojify-${{ matrix.target }}.${{ matrix.archive }}
            emojify-${{ matrix.target }}.${{ matrix.archive }}.sha256

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/emojify-*.tar.gz
            artifacts/emojify-*.zip
            artifacts/emojify-*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  docker:
    name: Docker
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}

  update-formula:
    name: Update Homebrew Formula
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: release-*
          merge-multiple: true

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Read checksums and update formula
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          SHA_AARCH64_DARWIN=$(awk '{print $1}' artifacts/emojify-aarch64-apple-darwin.tar.gz.sha256)
          SHA_X86_64_DARWIN=$(awk '{print $1}' artifacts/emojify-x86_64-apple-darwin.tar.gz.sha256)
          SHA_AARCH64_LINUX=$(awk '{print $1}' artifacts/emojify-aarch64-unknown-linux-gnu.tar.gz.sha256)
          SHA_X86_64_LINUX=$(awk '{print $1}' artifacts/emojify-x86_64-unknown-linux-gnu.tar.gz.sha256)

          cat > Formula/l33t0-emojify.rb <<RUBY
          class L33t0Emojify < Formula
            desc "Generate platform-compatible custom emoji images"
            homepage "https://github.com/l33t0/emojify"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/l33t0/emojify/releases/download/v#{version}/emojify-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_AARCH64_DARWIN}"
              end
              on_intel do
                url "https://github.com/l33t0/emojify/releases/download/v#{version}/emojify-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_X86_64_DARWIN}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/l33t0/emojify/releases/download/v#{version}/emojify-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_AARCH64_LINUX}"
              end
              on_intel do
                url "https://github.com/l33t0/emojify/releases/download/v#{version}/emojify-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_X86_64_LINUX}"
              end
            end

            def install
              bin.install "emojify"
            end

            test do
              system bin/"emojify", "--version"
            end
          end
          RUBY

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Formula/l33t0-emojify.rb

      - name: Commit and push formula update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/l33t0-emojify.rb
          git commit -m "chore: update Homebrew formula for v${{ steps.version.outputs.VERSION }}"
          git push origin master
